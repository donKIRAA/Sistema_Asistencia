<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIA - Gestión de Asistencia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="pantalla-login" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100%;">
        <div class="registro-card">
            <h2 style="text-align: center; margin-bottom: 20px;">Acceso Restringido</h2>
            <div class="campo">
                <input type="text" id="login_user" placeholder="Usuario">
            </div>
            <div class="campo">
                <input type="password" id="login_pass" placeholder="Contraseña">
            </div>
            <button class="btn-guardar" onclick="iniciarSesion()">Ingresar al Sistema</button>
        </div>
    </div>

    <div id="dashboard" style="display: none; width: 100%;">
        
        <div class="sidebar">
            <h2>Panel Supervisor</h2>
            <button onclick="mostrarPantalla('entrada')">Registro de Entrada</button>
            <button onclick="mostrarPantalla('salida')">Registro de Salida</button>
            <button onclick="mostrarPantalla('gestion')" style="background: #16a085; margin-top: 30px;">Gestión de Personal</button>
            <button id="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>

        <div class="main-content">
            
            <div id="seccion-asistencia">
                <div class="header-asistencia">
                    <h1 id="titulo-pantalla">Registro de Entrada</h1>
                    <input type="text" id="busqueda_rapida" placeholder="Buscar por Nombre o DNI..." onkeyup="filtrarLista()">
                </div>
                
                <div id="lista-empleados" class="grid-empleados">
                    </div>
            </div>

            <div id="seccion-gestion" class="hidden">
                <h1 id="titulo-gestion" style="margin-top: 0;">Gestión de Personal</h1>
                <div class="gestion-container">
                    
                    <div class="lista-gestion">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
    <h3 id="titulo-tabla-gestion" style="margin: 0; color: #2c3e50;">Empleados Activos</h3>
    <button id="btn-toggle-activos" class="btn-accion" style="background: #7f8c8d;" onclick="toggleVistaInactivos()">Ver Historial de Bajas</button>
</div>
                        <div style="overflow-x: auto;">
                            <table class="tabla-empleados">
                                <thead id="tabla-empleados-head">
                                    <tr>
                                        <th>DNI</th>
                                        <th>Nombre Completo</th>
                                        <th>Horario (Ent/Sal)</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="tabla-empleados-body">
                                    </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="registro-card" id="form-gestion-card">
                        <h3 id="form-titulo" style="margin-top: 0; color: #2c3e50;">Registrar Nuevo Empleado</h3>
                        <div class="campo"><input type="text" id="reg_dni" placeholder="DNI (8 dígitos)" maxlength="8"></div>
                        <div class="campo"><input type="text" id="reg_nombre" placeholder="Nombre Completo"></div>
                        <div class="campo"><label>Entrada:</label><input type="time" id="reg_entrada" value="08:00"></div>
                        <div class="campo"><label>Salida:</label><input type="time" id="reg_salida" value="18:00"></div>
                        
                        <button id="btn-guardar-nuevo" class="btn-guardar" style="background: #2980b9;" onclick="guardarNuevoEmpleado()">Guardar Empleado</button>
                        
                        <div id="controles-edicion" class="hidden">
                            <button class="btn-guardar" style="background: #f39c12; margin-bottom: 10px;" onclick="enviarEdicion()">Actualizar Cambios</button>
                            <button class="btn-guardar" style="background: #95a5a6; margin-top: 0;" onclick="cancelarEdicion()">Cancelar Edición</button>
                        </div>
                    </div>

                </div>
            </div> </div> </div> <script src="app.js"></script>
</body>
</html>
